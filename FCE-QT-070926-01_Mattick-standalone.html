  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

07em;text-transform:uppercase;padding:8px 12px;margin-top:13px;\">Terms &amp; Conditions<\u002Fdiv>\n  <div style=\"border:1px solid #ececec;border-top:none;padding:10px 14px;\">\n    <div class=\"keep\" style=\"display:flex;gap:10px;padding:5px 0;border-bottom:1px solid #f3f1ec;\"><span style=\"font:700 8.5px/1.4 'Archivo';color:#1f3a52;min-width:138px;text-transform:uppercase;letter-spacing:.02em;\">1. Quote Validity<\u002Fspan><span style=\"font:400 9.5px/1.45 'Archivo';color:#555;\">This quote is valid through the date of service, July 16, 2026. Pricing is subject to vehicle availability at time of confirmation. A signed or electronic acceptance is required to confirm the reservation.<\u002Fspan><\u002Fdiv>\n    <div class=\"keep\" style=\"display:flex;gap:10px;padding:5px 0;border-bottom:1px solid #f3f1ec;\"><span style=\"font:700 8.5px/1.4 'Archivo';color:#1f3a52;min-width:138px;text-transform:uppercase;letter-spacing:.02em;\">2. Booking &amp; Deposit<\u002Fspan><span style=\"font:400 9.5px/1.45 'Archivo';color:#555;\">A 50% deposit is required to secure the reservation unless otherwise agreed in writing. The remaining balance is due prior to the date of service. Accepted methods: card, cash, Zelle, and approved corporate/government accounts (PO / net terms available on request).<\u002Fspan><\u002Fdiv>\n    <div class=\"keep\" style=\"display:flex;gap:10px;padding:5px 0;border-bottom:1px solid #f3f1ec;\"><span style=\"font:700 8.5px/1.4 'Archivo';color:#1f3a52;min-width:138px;text-transform:uppercase;letter-spacing:.02em;\">3. Cancellation Policy<\u002Fspan><span style=\"font:400 9.5px/1.45 'Archivo';color:#555;\">Cancellations made 72+ hours before service: full refund minus deposit. Within 48 hours: 50% of total charter fee is due. Within 24 hours or no-show: 100% of total charter fee is due. All cancellations must be confirmed in writing to Troy@1stclassenterprise.com.<\u002Fspan><\u002Fdiv>\n    <div class=\"keep\" style=\"display:flex;gap:10px;padding:5px 0;border-bottom:1px solid #f3f1ec;\"><span style=\"font:700 8.5px/1.4 'Archivo';color:#1f3a52;min-width:138px;text-transform:uppercase;letter-spacing:.02em;\">4. Overtime &amp; Additional Charges<\u002Fspan><span style=\"font:400 9.5px/1.45 'Archivo';color:#555;\">Overtime begins after the scheduled 7:00 PM end of the charter window and is billed in 15-minute increments at the prevailing hourly rate. Additional stops, route changes, or extended service requested on the day of service are subject to additional charges. Toll and parking fees, if incurred, are passed through at cost.<\u002Fspan><\u002Fdiv>\n    <div class=\"keep\" style=\"display:flex;gap:10px;padding:5px 0;border-bottom:1px solid #f3f1ec;\"><span style=\"font:700 8.5px/1.4 'Archivo';color:#1f3a52;min-width:138px;text-transform:uppercase;letter-spacing:.02em;\">5. Passenger Conduct &amp; Damage<\u002Fspan><span style=\"font:400 9.5px/1.45 'Archivo';color:#555;\">The client is responsible for the conduct of all passengers. Any damage to the vehicle will be billed at cost plus a $150 administrative fee. First Class Enterprise reserves the right to terminate service without refund if passenger conduct endangers the driver or vehicle.<\u002Fspan><\u002Fdiv>\n    <div class=\"keep\" style=\"display:flex;gap:10px;padding:5px 0;border-bottom:1px solid #f3f1ec;\"><span style=\"font:700 8.5px/1.4 'Archivo';color:#1f3a52;min-width:138px;text-transform:uppercase;letter-spacing:.02em;\">6. Equivalent Equipment<\u002Fspan><span style=\"font:400 9.5px/1.45 'Archivo';color:#555;\">First Class Enterprise reserves the right to substitute equivalent or superior equipment if the reserved vehicle is unavailable due to mechanical failure or operational reasons, at no additional cost to client.<\u002Fspan><\u002Fdiv>\n    <div class=\"keep\" style=\"display:flex;gap:10px;padding:5px 0;border-bottom:1px solid #f3f1ec;\"><span style=\"font:700 8.5px/1.4 'Archivo';color:#1f3a52;min-width:138px;text-transform:uppercase;letter-spacing:.02em;\">7. CPUC Compliance<\u002Fspan><span style=\"font:400 9.5px/1.45 'Archivo';color:#555;\">First Class Enterprise operates exclusively as a prearranged transportation carrier under CPUC TCP # 0047518-A and LAWA Permit # 36031. All trips are prearranged — no street hails. A waybill is maintained for every trip per CPUC and LAWA requirements.<\u002Fspan><\u002Fdiv>\n    <div class=\"keep\" style=\"display:flex;gap:10px;padding:5px 0;border-bottom:1px solid #f3f1ec;\"><span style=\"font:700 8.5px/1.4 'Archivo';color:#1f3a52;min-width:138px;text-transform:uppercase;letter-spacing:.02em;\">8. Limitation of Liability<\u002Fspan><span style=\"font:400 9.5px/1.45 'Archivo';color:#555;\">First Class Enterprise is not liable for delays or losses caused by traffic, weather, mechanical failure, or circumstances beyond our control. Maximum liability shall not exceed the total amount paid for the specific trip in question.<\u002Fspan><\u002Fdiv>\n    <div class=\"keep\" style=\"display:flex;gap:10px;padding:5px 0;\"><span style=\"font:700 8.5px/1.4 'Archivo';color:#1f3a52;min-width:138px;text-transform:uppercase;letter-spacing:.02em;\">9. Acceptance of Terms<\u002Fspan><span style=\"font:400 9.5px/1.45 'Archivo';color:#555;\">By accepting this quote verbally, electronically, or in writing, the client agrees to all terms stated herein. This document constitutes the basis of a binding charter agreement upon acceptance. Governing law: State of California, Los Angeles County.<\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"margin-top:13px;padding-top:9px;font:400 11px 'Archivo';color:#333;\">Authorized By: <b style=\"color:#1f3a52;\">Troy Stuart — Director of Operations<\u002Fb><br><span style=\"color:#666;\">First Class Enterprise, Inc.<\u002Fspan><\u002Fdiv>\n  <div style=\"margin-top:14px;text-align:center;font:400 8.5px 'Archivo';color:#9a937f;border-top:1px solid #ececec;padding-top:8px;\">First Class Enterprise, Inc. — TCP # 0047518-A | LAWA Permit # 36031 | CPUC Certified | 213-551-4343<\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">class Component extends DCLogic {\n  state = { discountPct: 10 };\n  fmt(v){ return '$' + Number(v).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }\n  renderVals(){\n    const base = 2150;\n    const pct = Math.max(0, Math.min(100, Number(this.state.discountPct) || 0));\n    const disc = base * pct / 100;\n    const total = base - disc;\n    return {\n      discountPct: this.state.discountPct,\n      onDisc: (e) => this.setState({ discountPct: e.target.value }),\n      hasDiscount: pct > 0,\n      discLabel: pct + '%',\n      discFmt: '\\u2212' + this.fmt(disc),\n      totalFmt: this.fmt(total),\n    };\n  }\n}<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
